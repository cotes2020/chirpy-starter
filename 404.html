<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 50%, #3d2817 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated gears background */
        .gear {
            position: absolute;
            border: 3px solid #8b6914;
            border-radius: 50%;
            opacity: 0.15;
        }

        .gear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30%;
            height: 30%;
            background: transparent;
            border-radius: 50%;
            border: 2px solid #8b6914;
        }

        .gear-1 {
            width: 200px;
            height: 200px;
            top: 10%;
            left: 10%;
            animation: rotate 20s linear infinite;
        }

        .gear-2 {
            width: 150px;
            height: 150px;
            top: 60%;
            right: 10%;
            animation: rotateReverse 15s linear infinite;
        }

        .gear-3 {
            width: 100px;
            height: 100px;
            bottom: 20%;
            left: 20%;
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Steam particles */
        .steam {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 8s ease-in-out infinite;
        }

        .steam-1 { top: 80%; left: 15%; animation-delay: 0s; }
        .steam-2 { top: 70%; right: 20%; animation-delay: 2s; }
        .steam-3 { top: 85%; left: 60%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-50px) scale(1.2); opacity: 0.1; }
        }

        .container {
            text-align: center;
            padding: 40px;
            background: linear-gradient(145deg, rgba(60, 40, 20, 0.9), rgba(40, 25, 15, 0.95));
            border: 4px solid #8b6914;
            border-radius: 10px;
            box-shadow: 
                0 0 20px rgba(139, 105, 20, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.5),
                0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            background: linear-gradient(45deg, #8b6914, #d4af37, #8b6914);
            border-radius: 12px;
            z-index: -1;
            opacity: 0.3;
        }

        /* Rivets decoration */
        .rivet {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #d4af37 0%, #8b6914 100%);
            border-radius: 50%;
            box-shadow: inset 0 -2px 3px rgba(0,0,0,0.5);
        }

        .rivet-tl { top: 10px; left: 10px; }
        .rivet-tr { top: 10px; right: 10px; }
        .rivet-bl { bottom: 10px; left: 10px; }
        .rivet-br { bottom: 10px; right: 10px; }

        .error-code {
            font-family: 'Rye', serif;
            font-size: 120px;
            color: #d4af37;
            text-shadow: 
                3px 3px 0 #3d2817,
                -1px -1px 0 #8b6914,
                0 0 20px rgba(212, 175, 55, 0.5);
            margin-bottom: 10px;
            letter-spacing: 10px;
        }

        .error-code .zero {
            display: inline-block;
            animation: steamPulse 2s ease-in-out infinite;
        }

        @keyframes steamPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-family: 'Rye', serif;
            font-size: 28px;
            color: #c9b037;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p {
            color: #b8a080;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .countdown-container {
            background: linear-gradient(145deg, #2a1f15, #1a120c);
            border: 2px solid #6b5014;
            border-radius: 8px;
            padding: 15px 30px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .countdown-label {
            color: #8b6914;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
        }

        #countdown {
            font-family: 'Rye', serif;
            font-size: 36px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #1a120c;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid #4a3515;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #8b6914, #d4af37);
            width: 100%;
            transition: width 1s linear;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .btn-container {
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(145deg, #6b5014, #8b6914);
            color: #f0e0c0;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid #d4af37;
            border-radius: 5px;
            box-shadow: 
                0 5px 15px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            background: linear-gradient(145deg, #8b6914, #a67c00);
            transform: translateY(-2px);
            box-shadow: 
                0 8px 25px rgba(139, 105, 20, 0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .btn:hover::before {
            left: 100%;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #8b6914, transparent);
            margin: 20px auto;
        }

        .quote {
            font-style: italic;
            color: #8b7355;
            font-size: 14px;
            margin-top: 15px;
            border-left: 3px solid #8b6914;
            padding-left: 15px;
            text-align: left;
        }

        /* Pipe decorations */
        .pipe {
            position: absolute;
            background: linear-gradient(90deg, #4a3515, #6b5014, #4a3515);
            border: 1px solid #2a1f15;
        }

        .pipe-left {
            width: 4px;
            height: 100px;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .pipe-right {
            width: 4px;
            height: 100px;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 80px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Background gears -->
    <div class="gear gear-1"></div>
    <div class="gear gear-2"></div>
    <div class="gear gear-3"></div>

    <!-- Steam effects -->
    <div class="steam steam-1"></div>
    <div class="steam steam-2"></div>
    <div class="steam steam-3"></div>

    <div class="container">
        <!-- Rivets -->
        <div class="rivet rivet-tl"></div>
        <div class="rivet rivet-tr"></div>
        <div class="rivet rivet-bl"></div>
        <div class="rivet rivet-br"></div>

        <!-- Pipes -->
        <div class="pipe pipe-left"></div>
        <div class="pipe pipe-right"></div>

        <div class="error-code">4<span class="zero">0</span>4</div>
        
        <h1>⚙️ Mechanism Malfunction ⚙️</h1>
        
        <div class="divider"></div>
        
        <p>
            The requested page has gone astray in the æther, 
            perhaps lost to the gears of time or consumed by the steam engines.
        </p>

        <div class="countdown-container">
            <div class="countdown-label">Auto-Return to Homepage</div>
            <div id="countdown">10</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="btn-container">
            <a href="/" class="btn">Return to Safety</a>
        </div>

        <div class="quote">
            "Even the most intricate clockwork may stumble upon a cog misplaced."
        </div>
    </div>

    <script>
        // Countdown timer with redirect
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');
        const progressFill = document.getElementById('progressFill');
        const totalTime = 10;

        function updateCountdown() {
            countdownElement.textContent = timeLeft;
            const progressPercent = (timeLeft / totalTime) * 100;
            progressFill.style.width = progressPercent + '%';
            
            if (timeLeft <= 0) {
                window.location.href = '/';
            } else {
                timeLeft--;
                setTimeout(updateCountdown, 1000);
            }
        }

        // Start the countdown
        updateCountdown();

        // Add some random steam particles
        function createSteam() {
            const steam = document.createElement('div');
            steam.className = 'steam';
            steam.style.left = Math.random() * 100 + '%';
            steam.style.top = '100%';
            steam.style.animationDuration = (5 + Math.random() * 5) + 's';
            document.body.appendChild(steam);
            
            setTimeout(() => {
                steam.remove();
            }, 10000);
        }

        // Create steam occasionally
        setInterval(createSteam, 3000);
    </script>
</body>
</html>
