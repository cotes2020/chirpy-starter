<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            /* Dark, grimy, layered background */
            background:
                radial-gradient(circle at top left, rgba(40, 24, 14, 0.4) 0%, transparent 55%),
                radial-gradient(circle at bottom right, rgba(10, 6, 4, 0.9) 0%, transparent 60%),
                linear-gradient(135deg, #050307 0%, #050304 35%, #0b0504 70%, #15100e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            position: relative;
            color: #d6c7a0;
        }

        /* Animated gears background – darker, more like silhouettes */
        .gear {
            position: absolute;
            border: 2px solid #3b2a17;
            border-radius: 50%;
            opacity: 0.08;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .gear::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 26%;
            height: 26%;
            background: transparent;
            border-radius: 50%;
            border: 2px solid #2a1b10;
        }

        .gear-1 {
            width: 220px;
            height: 220px;
            top: 8%;
            left: 8%;
            animation: rotate 26s linear infinite;
        }

        .gear-2 {
            width: 170px;
            height: 170px;
            top: 62%;
            right: 8%;
            animation: rotateReverse 20s linear infinite;
        }

        .gear-3 {
            width: 120px;
            height: 120px;
            bottom: 18%;
            left: 22%;
            animation: rotate 14s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        /* Steam particles – dimmer, smokier */
        .steam {
            position: absolute;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle, rgba(180, 180, 180, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 9s ease-in-out infinite;
            filter: blur(1px);
        }

        .steam-1 { top: 80%; left: 15%; animation-delay: 0s; }
        .steam-2 { top: 70%; right: 20%; animation-delay: 2s; }
        .steam-3 { top: 85%; left: 60%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.25; }
            50% { transform: translateY(-60px) scale(1.3); opacity: 0.08; }
        }

        .container {
            text-align: center;
            padding: 40px;
            background:
                radial-gradient(circle at top center, rgba(60, 40, 25, 0.22) 0%, transparent 60%),
                radial-gradient(circle at bottom center, rgba(10, 6, 4, 0.85) 0%, transparent 65%),
                linear-gradient(145deg, rgba(12, 8, 6, 0.98), rgba(4, 2, 2, 0.99));
            border: 3px solid #3e2b16;
            border-radius: 12px;
            box-shadow:
                0 0 40px rgba(0, 0, 0, 0.9),
                0 14px 40px rgba(0, 0, 0, 0.9),
                inset 0 0 60px rgba(0, 0, 0, 0.9);
            position: relative;
            z-index: 10;
            max-width: 620px;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #4b381f, #8b6b32, #3b2917);
            border-radius: 14px;
            z-index: -1;
            opacity: 0.2;
            mix-blend-mode: screen;
        }

        /* Rivets decoration – tarnished brass */
        .rivet {
            position: absolute;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, #c29a54 0%, #5b421f 100%);
            border-radius: 50%;
            box-shadow:
                inset 0 -2px 3px rgba(0, 0, 0, 0.7),
                0 0 4px rgba(0, 0, 0, 0.9);
        }

        .rivet-tl { top: 10px; left: 10px; }
        .rivet-tr { top: 10px; right: 10px; }
        .rivet-bl { bottom: 10px; left: 10px; }
        .rivet-br { bottom: 10px; right: 10px; }

        .error-code {
            font-family: 'Rye', serif;
            font-size: 120px;
            color: #b38b5d;
            text-shadow:
                0 0 15px rgba(0, 0, 0, 0.9),
                0 0 35px rgba(0, 0, 0, 0.9),
                3px 3px 0 #1a100a;
            margin-bottom: 10px;
            letter-spacing: 10px;
        }

        .error-code .zero {
            display: inline-block;
            animation: steamPulse 2s ease-in-out infinite;
        }

        @keyframes steamPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.9)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.9)); }
        }

        h1 {
            font-family: 'Rye', serif;
            font-size: 26px;
            color: #d6c7a0;
            margin-bottom: 20px;
            text-shadow:
                0 0 6px rgba(0, 0, 0, 0.9),
                0 0 18px rgba(0, 0, 0, 0.9);
        }

        p {
            color: #a49478;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .countdown-container {
            background: radial-gradient(circle at top, rgba(80, 52, 26, 0.55) 0%, rgba(10, 5, 3, 0.95) 60%);
            border: 2px solid #5e4320;
            border-radius: 8px;
            padding: 15px 30px;
            display: inline-block;
            margin: 20px 0;
            box-shadow:
                inset 0 0 24px rgba(0, 0, 0, 0.95),
                0 0 18px rgba(0, 0, 0, 0.9);
        }

        .countdown-label {
            color: #7f6340;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        #countdown {
            font-family: 'Rye', serif;
            font-size: 34px;
            color: #e0cf9b;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #090605;
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid #3d2b17;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.9);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #614320, #b38b5d);
            width: 100%;
            transition: width 1s linear;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
        }

        .btn-container {
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(145deg, #3f2b17, #5b3d1e);
            color: #e3d3aa;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            border: 2px solid #8b6b32;
            border-radius: 5px;
            box-shadow:
                0 5px 18px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            background: linear-gradient(145deg, #5b3d1e, #7a5428);
            transform: translateY(-1px);
            box-shadow:
                0 8px 25px rgba(0, 0, 0, 0.95),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .btn:hover::before {
            left: 130%;
        }

        .divider {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #5b4323, transparent);
            margin: 20px auto;
            opacity: 0.7;
        }

        .quote {
            font-style: italic;
            color: #8a7a61;
            font-size: 14px;
            margin-top: 18px;
            border-left: 3px solid #5b4323;
            padding-left: 15px;
            text-align: left;
        }

        /* Pipe decorations – darker, oily metal */
        .pipe {
            position: absolute;
            background: linear-gradient(90deg, #241810, #47311c, #241810);
            border: 1px solid #120b07;
            box-shadow:
                0 0 10px rgba(0, 0, 0, 0.9),
                inset 0 0 6px rgba(0, 0, 0, 0.8);
        }

        .pipe-left {
            width: 4px;
            height: 110px;
            left: -22px;
            top: 50%;
            transform: translateY(-50%);
        }

        .pipe-right {
            width: 4px;
            height: 110px;
            right: -22px;
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 80px;
            }

            h1 {
                font-size: 20px;
            }

            .container {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>

</head>
<body>
    <!-- Background gears -->
    <div class="gear gear-1"></div>
    <div class="gear gear-2"></div>
    <div class="gear gear-3"></div>

    <!-- Steam effects -->
    <div class="steam steam-1"></div>
    <div class="steam steam-2"></div>
    <div class="steam steam-3"></div>

    <div class="container">
        <!-- Rivets -->
        <div class="rivet rivet-tl"></div>
        <div class="rivet rivet-tr"></div>
        <div class="rivet rivet-bl"></div>
        <div class="rivet rivet-br"></div>

        <!-- Pipes -->
        <div class="pipe pipe-left"></div>
        <div class="pipe pipe-right"></div>

        <div class="error-code">4<span class="zero">0</span>4</div>
        
        <h1>⚙️ Mechanism Malfunction ⚙️</h1>
        
        <div class="divider"></div>
        
        <p>
            The requested page has gone astray in the æther, 
            perhaps lost to the gears of time or consumed by the steam engines.
        </p>

        <div class="countdown-container">
            <div class="countdown-label">Auto-Return to Homepage</div>
            <div id="countdown">10</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="btn-container">
            <a href="/" class="btn">Return to Safety</a>
        </div>

        <div class="quote">
            "Even the most intricate clockwork may stumble upon a cog misplaced."
        </div>
    </div>

    <script>
        // Countdown timer with redirect
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');
        const progressFill = document.getElementById('progressFill');
        const totalTime = 10;

        function updateCountdown() {
            countdownElement.textContent = timeLeft;
            const progressPercent = (timeLeft / totalTime) * 100;
            progressFill.style.width = progressPercent + '%';
            
            if (timeLeft <= 0) {
                window.location.href = '/';
            } else {
                timeLeft--;
                setTimeout(updateCountdown, 1000);
            }
        }

        // Start the countdown
        updateCountdown();

        // Add some random steam particles
        function createSteam() {
            const steam = document.createElement('div');
            steam.className = 'steam';
            steam.style.left = Math.random() * 100 + '%';
            steam.style.top = '100%';
            steam.style.animationDuration = (5 + Math.random() * 5) + 's';
            document.body.appendChild(steam);
            
            setTimeout(() => {
                steam.remove();
            }, 10000);
        }

        // Create steam occasionally
        setInterval(createSteam, 3000);
    </script>
</body>
</html>
